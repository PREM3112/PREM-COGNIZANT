<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Hands-On 9 (Advanced a11y)</title>
    <link rel="stylesheet" href="styles.css">
    <!-- CSS Variables Polyfill for Cross-Browser Compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/css-vars-ponyfill@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            cssVars({
                // Polyfill options if needed
            });
        });
    </script>
</head>
<body>
    <!-- 
      HANDS-ON 9 AUDIT DOCUMENTATION & NOTES:
      --------------------------------------------------
      TASK 1: Accessibility Audit & Semantic Fixes
      - Initial Lighthouse Accessibility Score: 72/100
      - Flagged Issues: Missing alt text on images, missing form labels on inputs, skipped heading level (h1 to h3), non-semantic div used as interactive button.
      - Fixes Applied: Added descriptive alt text (and alt="" for decorative assets), linked labels to all form inputs via 'for' attributes, corrected heading hierarchy (h1 -> h2 -> h3), and replaced clickable divs with semantic <button> elements.

      TASK 3: Colour Contrast & Cross-Browser Testing
      - Colour Contrast Adjustments (WCAG AA minimum 4.5:1 requirement):
        * Before: #777 on #ffffff (Contrast Ratio ~ 4.4:1 - FAILED)
        * After:  #595959 on #ffffff (Contrast Ratio ~ 7.4:1 - PASSED)
      - CanIUse Check for CSS Feature: 'gap' property in Flexbox / CSS Grid
        * Finding: Widely supported across all modern browsers (Chrome 84+, Firefox 63+, Safari 14.1+, Edge 84+). Global support is ~96%.
    -->

    <header class="portal-header">
        <h1>Student Portal</h1>
        <!-- Task 2: Added aria-label and aria-current -->
        <nav aria-label="Main navigation">
            <a href="#home" aria-current="page" class="active">Home</a>
            <a href="#courses">Courses</a>
            <a href="#profile">Profile</a>
        </nav>
        <div class="enrollment-counter">
            <!-- Task 2: Live Region for Screen Readers -->
            Enrolled: <span id="count" role="status" aria-live="polite">0</span>
        </div>
    </header>

    <main class="portal-main">
        <!-- Search Form with Proper Labels (Task 1) -->
        <section class="search-section" style="margin-bottom: 20px;">
            <form role="search">
                <label for="course-search">Search Courses:</label>
                <input type="text" id="course-search" name="search" placeholder="Type to filter..." style="padding: 6px; margin-left: 10px;">
            </form>
        </section>

        <section id="courses" class="course-section">
            <h2>Available Courses</h2>
            <div class="course-grid">
                <!-- Task 2: Keyboard Accessible Course Card using tabindex and keydown listener -->
                <div class="course-card" tabindex="0" role="region" aria-label="Machine Learning Course Card" onkeydown="handleCardKeydown(event)">
                    <h3>Machine Learning</h3>
                    <p>Code: CS101</p>
                    <p>Credits: 3</p>
                    <button class="enroll-btn" onclick="enrollCourse()">Enroll</button>
                </div>
                <div class="course-card" tabindex="0" role="region" aria-label="Web Development Course Card" onkeydown="handleCardKeydown(event)">
                    <h3>Web Development</h3>
                    <p>Code: CS102</p>
                    <p>Credits: 4</p>
                    <button class="enroll-btn" onclick="enrollCourse()">Enroll</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let enrolledCount = 0;
        
        function enrollCourse() {
            enrolledCount++;
            document.getElementById('count').textContent = enrolledCount;
        }

        // Task 2: Trigger click/action when pressing Enter on a focused card
        function handleCardKeydown(event) {
            if (event.key === 'Enter') {
                const btn = event.currentTarget.querySelector('.enroll-btn');
                if (btn) btn.click();
            }
        }
    </script>
</body>
</html>
